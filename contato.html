<!DOCTYPE html>
<html lang="pt-br">
<!-- Cabeçalho -->
<head>
	<meta charset="utf-8">
	<title>My page title</title>
	<meta name="author" content="Maurício Rosito">
	<meta name="description" content="Exemplo - Aula de Programação Web II
	">
	<link
	href="https://fonts.googleapis.com/css?family=Open+Sans+Condensed:300|Sonsie+O
	ne" rel="stylesheet" type="text/css">
	<link rel="stylesheet" href="style.css" >
</head>
<!-- Corpo do Documento -->
<body>
<!-- Aqui está o nosso cabeçalho principal que é usado em todas as
	páginas do nosso site -->
	<header>
		<h1>Header</h1>
	</header>
	<nav>
		<ul>
			<li><a href="#">Home</a></li>
			<li><a href="#">Our team</a></li>
			<li><a href="#">Projects</a></li>
			<li><a href="#">Contact</a></li>
		</ul>
<!-- Um formulário de pesquisa é outra forma comum de navegar em um
	site. -->
	<form method="get" action="">
		<input type="search" name="query" placeholder="Search query">
		<input type="submit" value="Go!">
	</form>
</nav>
<!-- Aqui está o conteúdo principal da nossa página -->
<main>
	<section>
		<form action="" method="post">
			<div>
				<label for="email">Email:</label>
				<input type="email" id="email" name="email" required>
			</div>
			<div>
				<label for="assunto">Assunto:</label>
				<input type="text" id="assunto" name="assunto" required>
			</div>
			<div>
				<label for="mensagem">Mensagem:</label>
				<textarea id="mensagem" name="mensagem"></textarea>
			</div>
			<div class="button">
				<input type="submit" value="Enviar">
			</div>
		</form>
	</section>
	<!-- o conteúdo aside -->
	<aside>
		<h2>Related</h2>
		<ul>
			<li><a href="#">Oh I do like to be beside the seaside</a></li>
			<li><a href="#">Oh I do like to be beside the sea</a></li>
			<li><a href="#">Although in the North of England</a></li>
			<li><a href="#">It never stops raining</a></li>
			<li><a href="#">Oh well...</a></li>
		</ul>
	</aside>
</main>
<!-- E aqui está o nosso rodapé principal que é usado em todas as páginas
	do nosso site -->
	<footer>
		<p>©Copyright 2050 by nobody. All rights reversed.</p>
	</footer>
</body>
</html>
